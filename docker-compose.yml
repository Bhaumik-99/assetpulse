version: '3.8'

x-airflow-common: &airflow-common
  build: .
  environment:
    - AIRFLOW__CORE__DAGS_FOLDER=/app/airflow/dags
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    - AIRFLOW__CORE__FERNET_KEY=your-fernet-key-here
    - ASSETPULSE_CONFIG_PATH=config/development.yaml
    - PYTHONPATH=/app
  volumes:
    - ./data:/app/data
    - ./logs:/app/logs
    - ./config:/app/config
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "
        pip install apache-airflow[postgres] &&
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@assetpulse.io
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install apache-airflow[postgres] && airflow webserver --port 8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install apache-airflow[postgres] && airflow scheduler"
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port=8501 --server.headless=true
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - ASSETPULSE_CONFIG_PATH=config/development.yaml
      - PYTHONPATH=/app

volumes:
  postgres_data:
